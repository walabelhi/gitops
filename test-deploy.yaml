---
# Source: microapp/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microapp
  labels:
    helm.sh/chart: microapp-0.1.0
    app.kubernetes.io/name: microapp
    app.kubernetes.io/instance: microapp
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: microapp/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: microapp
  labels:
    helm.sh/chart: microapp-0.1.0
    app.kubernetes.io/name: microapp
    app.kubernetes.io/instance: microapp
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: microapp
    app.kubernetes.io/instance: microapp
---
# Source: microapp/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microapp
  labels:
    helm.sh/chart: microapp-0.1.0
    app.kubernetes.io/name: microapp
    app.kubernetes.io/instance: microapp
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: microapp
      app.kubernetes.io/instance: microapp
  template:
    metadata:
      labels:
        helm.sh/chart: microapp-0.1.0
        app.kubernetes.io/name: microapp
        app.kubernetes.io/instance: microapp
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: microapp
      containers:
        - name: microapp
          image: "nginx:1.16.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
---
# Source: microapp/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "microapp-test-connection"
  labels:
    helm.sh/chart: microapp-0.1.0
    app.kubernetes.io/name: microapp
    app.kubernetes.io/instance: microapp
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['microapp:80']
  restartPolicy: Never
