apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  labels:
    app: client
spec:
  replicas: {{ .Values.client.replicas }}
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: "{{ .Values.client.image }}:{{ .Values.client.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.client.port }}
---          
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.client.service }}
spec:
  selector:
    app: client
  ports:
    - protocol: TCP
      port: 80
      targetPort: {{ .Values.client.port }}
  type: ClusterIP
