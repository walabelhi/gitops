apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ticket
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:

  # ---------------- RabbitMQ ----------------
  - host: {{ .Values.ingress.hosts.rabbit.host }}
    http:
      paths:
        - path: {{ .Values.ingress.hosts.rabbit.path }}
          pathType: Prefix
          backend:
            service:
              name: {{ .Values.ingress.hosts.rabbit.service }}
              port:
                number: {{ .Values.ingress.hosts.rabbit.port }}

  # ---------------- APP ----------------
  - host: {{ .Values.ingress.hosts.app.host }}
    http:
      paths:

        - path: /api/payments/?(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: {{ .Values.payments.service }}
              port:
                number: {{ .Values.payments.port }}

        - path: /api/users/?(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: {{ .Values.auth.service }}
              port:
                number: {{ .Values.auth.port }}

        - path: /api/tickets/?(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: {{ .Values.tickets.service }}
              port:
                number: {{ .Values.tickets.port }}

        - path: /api/orders/?(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: {{ .Values.orders.service }}
              port:
                number: {{ .Values.orders.port }}

        - path: /?(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: {{ .Values.client.service }}
              port:
                number: {{ .Values.client.port }}
