apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: {{ .Values.services.auth.replicas }}

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: auth
          image: "{{ .Values.services.auth.image }}:{{ .Values.services.auth.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          ports:
            - containerPort: {{ .Values.services.auth.port }}

          # ================= ENV FROM VALUES.YAML =================
          env:
            {{- range $key, $value := .Values.services.auth.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.auth.service }}

spec:
  selector:
    app: auth

  ports:
    - port: {{ .Values.services.auth.port }}
      targetPort: {{ .Values.services.auth.port }}

  type: ClusterIP
