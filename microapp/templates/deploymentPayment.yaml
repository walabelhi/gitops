apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
spec:
  replicas: {{ .Values.services.payment.replicas }}
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: "{{ .Values.services.payment.image }}:{{ .Values.services.payment.tag }}"
          ports:
            - containerPort: {{ .Values.services.payment.port }}

          env:
            - name: RABBITMQ_URL
              value: {{ .Values.services.payment.env.RABBITMQ_URL | quote }}

            - name: STRIPE_SECRET_KEY
              value: {{ .Values.services.payment.env.STRIPE_SECRET_KEY | quote }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.payment.service }}
spec:
  selector:
    app: payment
  ports:
    - port: {{ .Values.services.payment.port }}
      targetPort: {{ .Values.services.payment.port }}
  type: ClusterIP
