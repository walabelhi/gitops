global:
  imagePullPolicy: IfNotPresent

service:
  type: ClusterIP

services:
  auth:
    image: hammamioumayma/auth
    tag: latest
    replicas: 2
    port: 3000
    service: auth-service
    env:
      MONGO_URI: mongodb://mongo-service:27017/auth
      RABBITMQ_URL: amqp://rabbit-service:5672
      JWT_KEY: my-secret-key

  orders:
    image: hammamioumayma/orders
    tag: latest
    replicas: 2
    port: 3000
    service: orders-service
    env:
      MONGO_URI: mongodb://mongo-service:27017/orders
      RABBITMQ_URL: amqp://rabbit-service:5672
      JWT_KEY: my-secret-key   # ✅ FIXED

  payment:
    image: hammamioumayma/payments
    tag: latest
    replicas: 2
    port: 3000
    service: payments-service
    env:
      RABBITMQ_URL: amqp://rabbit-service:5672
      JWT_KEY: my-secret-key   # ⚠️ add this too (safe)

  tickets:
    image: hammamioumayma/tickets
    tag: latest
    replicas: 2
    port: 3000
    service: tickets-service
    env:
      JWT_KEY: my-secret-key   # ⚠️ add if it uses auth middleware

  expiration:
    image: hammamioumayma/expiration
    tag: latest
    replicas: 2
    port: 3000
    service: expiration-service

  client:
    image: hammamioumayma/client
    tag: latest
    replicas: 2
    port: 3000
    service: client-service
