global:
  imagePullPolicy: IfNotPresent

service:
  type: ClusterIP

services:
  auth:
    image: wala12/auth
    tag: v3
    replicas: 2
    port: 3000
    service: auth-service
    env:
      MONGO_URI: mongodb://mongo-service:27017/auth
      RABBITMQ_URL: amqp://rabbit-service:5672
      JWT_KEY: my-secret-key

  orders:
    image: wala12/orders
    tag: latest
    replicas: 2
    port: 3000
    service: orders-service
    env:
      MONGO_URI: mongodb://mongo-service:27017/orders
      RABBITMQ_URL: amqp://rabbit-service:5672
      JWT_KEY: my-secret-key

  payment:
    image: wala12/payments
    tag: latest
    replicas: 2
    port: 3000
    service: payments-service
    env:
      RABBITMQ_URL: amqp://rabbit-service:5672
      STRIPE_SECRET_KEY: pk_test_51TWYkd3B48txW3wFuhOoU3hxYveZParC5fsMqSoHtjkefoBz9I68XxI5gZcNBLJhKwcEx1eH6raDGI63iwSUfWVC00hvoVG8UZ

  tickets:
    image: wala12/tickets
    tag: latest
    replicas: 2
    port: 3000
    service: tickets-service
    env:
      JWT_KEY: my-secret-key
      RABBITMQ_URL: amqp://rabbit-service:5672
      MONGO_URI: mongodb://mongo-service:27017/tickets

  expiration:
    image: wala12/expiration
    tag: latest
    replicas: 2
    port: 3000
    service: expiration-service
    env:
      RABBITMQ_URL: amqp://rabbit-service:5672
      MONGO_URI: mongodb://mongo-service:27017/expiration

  client:
    image: wala12/client
    tag: latest
    replicas: 2
    port: 3000
    service: client-service

ingress:
  enabled: true
  className: nginx
  hosts:
    rabbit:
      host: rabbitlokal.com
      service: rabbit-service
      port: 15672
      path: /

    app:
      host: ticketapp.com
      service: client-service
      port: 3000
      path: /

mongo:
  enabled: true
  image: mongo
  tag: "6.0"
  port: 27017
  replicaCount: 1
  persistence:
    enabled: false

rabbitmq:
  enabled: true
  name: rabbit-service
  replicas: 1
  resources:
    cpu: "1000m"
    memory: "512Mi"
  config:
    logLevel: debug
    channelMax: 1700
    defaultUser: guest
    defaultPass: guest
    admin: true
