apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth

spec:
  replicas: {{ .Values.services.auth.replicas }}

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: auth
          image: "{{ .Values.services.auth.image }}:{{ .Values.services.auth.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          ports:
            - containerPort: {{ .Values.services.auth.port }}

          env:
            - name: MONGO_URI
              value: mongodb://mongo-service:27017/auth

            - name: RABBITMQ_URL
              value: amqp://rabbit-service:5672

            - name: JWT_KEY
              value: "my-secret-key"
