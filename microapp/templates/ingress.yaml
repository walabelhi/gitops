apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ticket
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: {{ .Values.ingress.className | quote }}

  rules:
    # ---------------- RabbitMQ ----------------
    - host: {{ .Values.ingress.hosts.rabbit.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.hosts.rabbit.path | default "/" | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.hosts.rabbit.service | quote }}
                port:
                  number: {{ .Values.ingress.hosts.rabbit.port }}

    # ---------------- APP ----------------
    - host: {{ .Values.ingress.hosts.app.host | quote }}
      http:
        paths:
          - path: /api/payments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.services.payment.service | quote }}
                port:
                  number: {{ .Values.services.payment.port }}

          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.services.auth.service | quote }}
                port:
                  number: {{ .Values.services.auth.port }}

          - path: /api/tickets(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.services.tickets.service | quote }}
                port:
                  number: {{ .Values.services.tickets.port }}

          - path: /api/orders(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.services.orders.service | quote }}
                port:
                  number: {{ .Values.services.orders.port }}

          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.services.client.service | quote }}
                port:
                  number: {{ .Values.services.client.port }}
